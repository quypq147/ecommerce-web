services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    pull_policy: always
    container_name: ecommerce-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    pull_policy: always
    container_name: ecommerce-db-init
    depends_on:
      db:
        condition: service_healthy
    command: /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S db,1433 -U sa -P $$SA_PASSWORD -C -Q \"IF DB_ID(N'EcommerceDb') IS NULL CREATE DATABASE [EcommerceDb];\""
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-web
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=EcommerceDb;User Id=sa;Password=YourStrong@Passw0rd;Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=True"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

volumes:
  sql-data:
